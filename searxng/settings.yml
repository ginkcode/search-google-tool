use_default_settings: true

server:
  secret_key: "change-this-to-a-random-secret"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "vi-VN"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: true
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: true
    categories: news
