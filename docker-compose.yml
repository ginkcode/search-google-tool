services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped
    networks:
      - search

  # Node.js MCP — stdio mode: spawned on-demand per session by the MCP client
  mcp:
    build: ./node-mcp
    image: searxng-mcp:latest
    environment:
      - SEARXNG_URL=http://searxng:8080
    stdin_open: true
    networks:
      - search

  # Node.js MCP — http mode: persistent service on :3333
  mcp-http:
    build: ./node-mcp
    image: searxng-mcp:latest
    ports:
      - "3333:3333"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - TRANSPORT=http
      - PORT=3333
    restart: unless-stopped
    networks:
      - search

  # Go MCP — stdio mode: spawned on-demand per session by the MCP client
  go-mcp:
    build: ./go-mcp
    image: searxng-go-mcp:latest
    environment:
      - SEARXNG_URL=http://searxng:8080
    stdin_open: true
    networks:
      - search

  # Go MCP — http mode: persistent service on :3334
  go-mcp-http:
    build: ./go-mcp
    image: searxng-go-mcp:latest
    ports:
      - "3334:3334"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - TRANSPORT=http
      - PORT=3334
    restart: unless-stopped
    networks:
      - search

networks:
  search:
    name: searxng-network
